      - article [ref=e94]:
        - generic [ref=e95]:
          - heading "Initializer + Coding Agent — A Two-Phase Harness Pattern" [level=1] [ref=e96]
          - paragraph [ref=e97]:
            - text: If you've ever handed a frontier coding model a prompt like
            - emphasis [ref=e98]: "\"build me a Claude.ai clone\""
            - text: "and walked away for the afternoon, you know how this ends: a repo with a working login form, half a message list, a"
            - code [ref=e99]: "TODO: hook up streaming"
            - text: mid-file, and a very confident commit message. The model ran out of context.
          - paragraph [ref=e100]: The instinct is to blame the model. It's almost always the harness.
          - paragraph [ref=e101]:
            - text: "This post is about a specific pattern that fixes this class of failure:"
            - strong [ref=e102]: split your long-running agent into two phases — an Initializer that runs once, and a Coding Agent that runs many times, each session doing exactly one feature on a clean slate.
          - paragraph [ref=e103]:
            - text: It's based on
            - link "Effective harnesses for long-running agents" [ref=e104] [cursor=pointer]:
              - /url: https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents
            - text: ", with a reference in the"
            - link "autonomous-coding quickstart" [ref=e105] [cursor=pointer]:
              - /url: https://github.com/anthropics/claude-quickstarts/tree/main/autonomous-coding
            - text: . I want to unpack
            - emphasis [ref=e106]: why
            - text: it works, not just what it looks like.
          - separator [ref=e107]
          - 'heading "Core insight: compaction is not enough" [level=2] [ref=e108]'
          - paragraph [ref=e109]: The standard answer to "context windows are finite" is compaction. Summarize the old stuff, keep the new stuff, loop forever.
          - paragraph [ref=e110]: Compaction is fine for a two-hour refactor. It falls apart for a two-day build.
          - paragraph [ref=e111]: "Point Opus 4.5 on the Agent SDK at a high-level prompt like \"build a Claude.ai clone\" and watch:"
          - list [ref=e112]:
            - listitem [ref=e113]: ▸ Session 1 writes a lot of code and hits the context limit with half-finished features.
            - listitem [ref=e114]: ▸ Session 2 reads a compacted summary — a lossy, narrative version of what happened — and has to reconstruct intent from it.
            - listitem [ref=e115]: ▸ Session 3 reads a compaction of the compaction. Information decays geometrically.
          - paragraph [ref=e116]: By session 4, the model is playing telephone with its past self. It doesn't know which features are done, which are half-done, and which it hallucinated into the summary.
          - paragraph [ref=e117]:
            - strong [ref=e118]: Compaction is in-context memory. Long-running agents need out-of-context memory
            - text: — files, structured state, git history. Things the agent re-reads every session, not things it carries forward through summarization.
          - paragraph [ref=e119]: That's the thesis. Everything else is mechanics.
          - separator [ref=e120]
          - heading "Two failure modes you will hit" [level=2] [ref=e121]
          - paragraph [ref=e122]: Before we get to the pattern, let's be specific about what goes wrong without it. Two failure modes dominate.
          - heading "(A) One-shot tendency" [level=3] [ref=e123]
          - paragraph [ref=e124]:
            - text: The model tries to do everything in one session. Given a big prompt, it writes a big solution. The context fills up. It keeps pushing. The session ends with half-implemented features,
            - code [ref=e125]: // TODO
            - text: scattered mid-function, a test suite that doesn't run, and no clean commit to return to. The model has no idea it's broken — it ran out of room before it could check.
          - heading "(B) Premature victory" [level=3] [ref=e126]
          - paragraph [ref=e127]:
            - text: "Sneakier. Session 2 reads the progress notes from Session 1: \"implemented login, messaging, streaming.\" The model looks at the code, sees something that"
            - emphasis [ref=e128]: looks
            - text: like login + messaging + streaming, and declares the project done. It didn't run it. It didn't test the flow. It trusted the narrative.
          - paragraph [ref=e129]:
            - text: Premature victory is the dual of one-shot. One-shot fails because the model tries to do too much; premature victory fails because the next model trusts the previous one's optimism. Any harness for long-running work has to solve
            - strong [ref=e130]: both
            - text: at once. This is why naive "just loop with compaction" doesn't cut it — compaction reinforces the previous session's narrative, which is exactly wrong when that narrative is over-optimistic.
          - separator [ref=e131]
          - heading "The two-phase harness" [level=2] [ref=e132]
          - paragraph [ref=e133]: The fix is structural. One agent doesn't do everything. You have two roles, with different responsibilities and different lifetimes.
          - code [ref=e135]: "┌──────────────────────────────────────────────────────────────┐ │ HARNESS DRIVER │ │ (your Python script) │ └──────────────────────────────────────────────────────────────┘ │ │ │ runs once │ runs N times ▼ ▼ ┌──────────────────────────┐ ┌──────────────────────────────┐ │ INITIALIZER AGENT │ │ CODING AGENT │ │ │ │ │ │ • read spec / brief │ │ • pwd + read git log │ │ • write init.sh │ │ • read claude-progress.txt │ │ • write feature_list.json│ │ • read feature_list.json │ │ • write progress file │ │ • pick highest-priority unit │ │ • git init + first commit│ │ • run init.sh (dev server) │ │ │ │ • implement ONE feature │ │ │ │ • e2e test via browser │ │ │ │ • flip passes: true │ │ │ │ • commit + update progress │ └──────────────────────────┘ └──────────────────────────────┘ │ ▲ │ │ └───── clean state repo ───────────┘ (shared on disk)"
          - paragraph [ref=e136]:
            - text: The initializer runs
            - strong [ref=e137]: once
            - text: . Its job is to turn a fuzzy human brief into a concrete, machine-readable plan plus a runnable scaffold.
          - paragraph [ref=e138]:
            - text: The coding agent runs
            - strong [ref=e139]: many times
            - text: ", each invocation a fresh process with no memory of the last one. It gets its memory by reading the files previous sessions wrote to disk."
          - paragraph [ref=e140]: Two agents, two purposes, one shared filesystem.
          - separator [ref=e141]
          - heading "The Initializer Agent" [level=2] [ref=e142]
          - paragraph [ref=e143]: The initializer is the only phase that thinks about the whole project at once. After it finishes, nobody has a global view again — every coding session works locally.
          - paragraph [ref=e144]: "Four artifacts, exactly:"
          - list [ref=e145]:
            - listitem [ref=e146]:
              - strong [ref=e147]:
                - code [ref=e148]: init.sh
              - text: "— one script that sets up the project from a cold checkout: install deps, run migrations, start the dev server in the background, print the URL. Every coding session runs this first. If"
              - code [ref=e149]: init.sh
              - text: is broken, nothing else matters.
            - listitem [ref=e150]:
              - strong [ref=e151]:
                - code [ref=e152]: feature_list.json
              - text: — the decomposed backlog. Format details in the next section.
            - listitem [ref=e153]:
              - strong [ref=e154]:
                - code [ref=e155]: claude-progress.txt
              - text: — short prose notes about where the project is and what's next. Updated at the end of every session.
            - listitem [ref=e156]:
              - strong [ref=e157]: An initial git commit
              - text: — scaffold, scripts, feature list, progress file all at
              - code [ref=e158]: HEAD
              - text: . From here, every session ends with a commit.
              - code [ref=e159]: git log
              - text: is the source of truth for what actually shipped.
          - paragraph [ref=e160]: The initializer doesn't implement features. It doesn't pick colors. It sets the table.
          - separator [ref=e161]
          - 'heading "Feature list design: why JSON beats Markdown" [level=2] [ref=e162]'
          - paragraph [ref=e163]: "\"That's just a todo list, why not a Markdown checklist?\""
          - paragraph [ref=e164]: Because when you give Claude a Markdown file, it treats it as prose. Prose is editable. The model will — with the best intentions — rewrite your priorities, reword descriptions, merge two features because it "felt cleaner," and split one into five because it "clarifies intent." Markdown todo lists are quicksand for agents.
          - paragraph [ref=e165]: JSON is different. Models are trained to treat JSON as structured data — something you read and write specific fields from, not something you casually rewrite. Combined with an explicit rule that only one field is writable, JSON becomes near-bulletproof external state.
          - paragraph [ref=e166]: "A reasonable schema:"
          - code [ref=e168]: "{ \"project\": \"claude-ai-clone\", \"created_at\": \"2026-04-19T10:00:00Z\", \"features\": [ { \"id\": \"auth-01\", \"title\": \"Email + password sign up\", \"description\": \"User can create account with email + password. Passwords hashed with bcrypt. Email uniqueness enforced.\", \"priority\": 1, \"depends_on\": [], \"acceptance\": [ \"POST /api/signup returns 201 with session cookie\", \"duplicate email returns 409\", \"password stored as bcrypt hash, not plaintext\" ], \"passes\": false }, { \"id\": \"auth-02\", \"title\": \"Email + password sign in\", \"description\": \"User can log in with credentials from auth-01.\", \"priority\": 2, \"depends_on\": [\"auth-01\"], \"acceptance\": [ \"POST /api/signin with valid creds returns 200 + cookie\", \"wrong password returns 401\", \"signed-in user can load /app\" ], \"passes\": false }, { \"id\": \"chat-01\", \"title\": \"Minimal chat page with message list\", \"description\": \"Authenticated user sees a chat page with past messages rendered from the DB.\", \"priority\": 3, \"depends_on\": [\"auth-02\"], \"acceptance\": [ \"GET /chat renders <ul> of messages\", \"unauthenticated GET /chat redirects to /signin\" ], \"passes\": false } ] }"
          - paragraph [ref=e169]: "The discipline is encoded in the coding agent's system prompt:"
          - blockquote [ref=e170]:
            - paragraph [ref=e171]:
              - text: You may only modify the
              - code [ref=e172]: passes
              - text: field. It is unacceptable to remove or edit tests, acceptance criteria, descriptions, or the structure of this file. If you believe a feature is wrong, stop and report — do not silently rewrite it.
          - paragraph [ref=e173]: That language isn't hedging — it's load-bearing. "Unacceptable" reads to the model as a hard rule. In practice it's enough to keep the file stable across dozens of sessions.
          - paragraph [ref=e174]:
            - code [ref=e175]: "passes: false"
            - text: is the other critical detail. It's the agent's only lever. When a session implements a feature, passes e2e tests, and commits clean, it flips the boolean to
            - code [ref=e176]: "true"
            - text: . One field — not prose, not vibes — is how future sessions know what's actually done.
          - separator [ref=e177]
          - 'heading "The coding agent: a startup ritual, not a free-for-all" [level=2] [ref=e178]'
          - paragraph [ref=e179]: Every time the coding agent wakes up, it runs the same five-step ritual before touching any code. Not optional.
          - code [ref=e181]: 1. pwd → confirm we're in the project 2. git log --oneline -20 → what shipped, most recent first cat claude-progress.txt → narrative notes from last session 3. cat feature_list.json → what's done, what's next, what's blocked 4. bash init.sh → install, migrate, start dev server 5. hit the app in a browser → verify last session's work still works
          - paragraph [ref=e182]: Only after step 5 does the agent pick a feature and start writing code.
          - paragraph [ref=e183]:
            - text: Call this
            - strong [ref=e184]: context bootstrap
            - text: — the out-of-context equivalent of compaction. Instead of inheriting a summary, the agent reconstructs its working context from files on disk. Same canonical sources, same order, every session.
          - paragraph [ref=e185]: "A few things worth pinning down:"
          - list [ref=e186]:
            - listitem [ref=e187]:
              - text: ▸
              - strong [ref=e188]: Git log before progress notes.
              - text: Git is ground truth; progress notes are optimistic. If they disagree, git wins.
            - listitem [ref=e189]:
              - text: ▸
              - strong [ref=e190]:
                - code [ref=e191]: init.sh
                - text: is non-negotiable.
              - text: If the dev server won't start, nothing the previous session claimed matters.
            - listitem [ref=e192]:
              - text: ▸
              - strong [ref=e193]: E2E verification before picking a new feature.
              - text: This is what kills premature victory. You don't trust the previous session's "done" — you open the browser.
          - paragraph [ref=e194]:
            - text: At step 3 the agent picks
            - emphasis [ref=e195]:
              - text: the single highest-priority feature with
              - code [ref=e196]: "passes: false"
              - text: and all dependencies satisfied
            - text: . Not two. Not "a cluster." One. Then it stops when that one is green and committed.
          - paragraph [ref=e197]: "One-feature-per-session kills both failure modes at once: it kills one-shot because the contract artificially constrains scope, and it kills premature victory because \"done\" isn't self-declared — it's an e2e test passing on a clearly scoped unit."
          - separator [ref=e198]
          - heading "End-to-end testing is the trust layer" [level=2] [ref=e199]
          - paragraph [ref=e200]: Unit tests are necessary but insufficient. The coding agent wrote them — it can't be the only thing checking them. If the model misunderstood the spec, the unit tests will be wrong in the same shape as the implementation, and they'll pass in a way that means nothing.
          - paragraph [ref=e201]: End-to-end is where you get independent signal. Spin up the real app, drive it like a user, see what happens.
          - paragraph [ref=e202]:
            - text: In practice that means browser automation.
            - link "Puppeteer MCP" [ref=e203] [cursor=pointer]:
              - /url: https://github.com/modelcontextprotocol/servers
            - text: works well — the agent can navigate, fill forms, click, and assert on the DOM.
          - paragraph [ref=e204]:
            - text: A verification pass for
            - code [ref=e205]: auth-01
            - text: ":"
          - code [ref=e207]: "→ navigate to http://localhost:3000/signup → fill #email with \"test+{{timestamp}}@example.com\" → fill #password with \"correct-horse-battery-staple\" → click button[type=submit] → assert url === \"/app\" → assert response cookie \"session\" is set → navigate to /signup again with same email → fill + submit → assert error text contains \"already exists\""
          - paragraph [ref=e208]:
            - text: "Three things: (1) it runs against the real server"
            - code [ref=e209]: init.sh
            - text: started, not a mock; (2) it checks observable behavior — URLs, DOM, cookies — not internal functions; (3) it's cheap enough to run every session, so the bootstrap's "did last session's work survive?" check is also an e2e pass over already-green features.
          - paragraph [ref=e210]:
            - text: This is what makes
            - code [ref=e211]: "passes: true"
            - text: mean something.
          - separator [ref=e212]
          - 'heading "Clean state commits: git + progress file together" [level=2] [ref=e213]'
          - paragraph [ref=e214]: "At the end of every coding session, two things happen in sequence:"
          - list [ref=e215]:
            - listitem [ref=e216]:
              - code [ref=e217]: "git commit -m \"feat(auth-01): email+password signup\""
              - text: — the code lands.
            - listitem [ref=e218]:
              - code [ref=e219]: claude-progress.txt
              - text: gets a short append — what shipped, what's tricky, what the next session should look at first.
          - paragraph [ref=e220]:
            - text: These do different jobs. Git is the
            - strong [ref=e221]: truth
            - text: "layer: append-only, timestamped, the diff is not negotiable."
            - code [ref=e222]: claude-progress.txt
            - text: is the
            - strong [ref=e223]: hints
            - text: "layer: notes to the next agent like \"email templates live in"
            - code [ref=e224]: /lib/email/
            - text: ", I monkeypatched the SMTP client for tests, watch out for the race in"
            - code [ref=e225]: /api/signin
            - text: I worked around with a retry."
          - paragraph [ref=e226]: Both are read at the start of every session. Neither is sufficient alone. Git without hints is terse and hard to reconstruct intent from. Hints without git drift. Together they are the out-of-context memory that replaces compaction.
          - paragraph [ref=e227]:
            - text: Both should end the session in a
            - emphasis [ref=e228]: clean
            - text: state — no uncommitted changes, no half-finished files, no broken dev server. If the feature isn't done by the context limit,
            - strong [ref=e229]: the session reverts to the last clean commit and reports "not done"
            - text: rather than committing broken work. This is how you keep git trustworthy.
          - separator [ref=e230]
          - heading "Where this pattern fits (and where it doesn't)" [level=2] [ref=e231]
          - paragraph [ref=e232]: Be honest about the shape of your project before reaching for this.
          - paragraph [ref=e233]:
            - strong [ref=e234]: "Good fits:"
            - text: web apps (feature-decomposable, e2e testable), CLIs (each subcommand is a natural unit), internal tools / dashboards / admin panels, data pipelines with discrete stages.
          - paragraph [ref=e235]:
            - strong [ref=e236]: "Bad fits:"
            - text: single-algorithm research like "design a better attention mechanism" (not decomposable into
            - code [ref=e237]: "passes: true/false"
            - text: ), highly coupled codebases where touching one function forces changes across the whole thing, anything whose value lives in
            - emphasis [ref=e238]: relationships
            - text: between components — a compiler's correctness is in global invariants, not "add lexer" + "add parser."
          - paragraph [ref=e239]: "Rule of thumb: if you can write acceptance as \"a user (or shell) does X and observes Y,\" this pattern works. Otherwise pick a different harness."
          - separator [ref=e240]
          - heading "Implementation sketch" [level=2] [ref=e241]
          - paragraph [ref=e242]: The harness driver itself is small. Most of the work is in the two system prompts.
          - code [ref=e244]: "# harness.py — pseudocode, omit the error handling for clarity from pathlib import Path import json, subprocess, time from claude_sdk import run_agent PROJECT = Path(\"./project\") def initialize(brief: str) -> None: \"\"\"Run once. Turns a brief into a runnable scaffold.\"\"\" run_agent( system_prompt=INITIALIZER_PROMPT, user_prompt=brief, workdir=PROJECT, allowed_tools=[\"write_file\", \"run_shell\", \"git\"], # the initializer is expected to produce: # init.sh, feature_list.json, claude-progress.txt, first git commit ) assert (PROJECT / \"feature_list.json\").exists() assert (PROJECT / \"init.sh\").exists() def next_feature() -> dict | None: features = json.loads((PROJECT / \"feature_list.json\").read_text())[\"features\"] features.sort(key=lambda f: f[\"priority\"]) for f in features: if f[\"passes\"]: continue if all(done(dep) for dep in f[\"depends_on\"]): return f return None # everything done def done(feature_id: str) -> bool: features = json.loads((PROJECT / \"feature_list.json\").read_text())[\"features\"] return any(f[\"id\"] == feature_id and f[\"passes\"] for f in features) def code_one_feature() -> bool: feat = next_feature() if feat is None: return False run_agent( system_prompt=CODING_PROMPT, # includes the startup ritual user_prompt=f\"Implement feature {feat['id']}: {feat['title']}\", workdir=PROJECT, allowed_tools=[\"read_file\", \"write_file\", \"run_shell\", \"git\", \"puppeteer\"], ) # agent is expected to leave a clean commit + updated progress file return True if __name__ == \"__main__\": if not (PROJECT / \"feature_list.json\").exists(): initialize(open(\"brief.md\").read()) while code_one_feature(): time.sleep(1) # fresh process each iteration — no state carried over print(\"all features passed.\")"
          - paragraph [ref=e245]:
            - text: "Two things to internalize:"
            - strong [ref=e246]:
              - text: each
              - code [ref=e247]: run_agent
              - text: call is a brand new process
            - text: — no shared memory, no shared context window, memory is the filesystem. And
            - strong [ref=e248]: the driver is dumb on purpose
            - text: — it doesn't pick features, validate work, or interpret results. All the intelligence is in the prompts and the artifacts.
          - separator [ref=e249]
          - heading "Closing thought" [level=2] [ref=e250]
          - paragraph [ref=e251]:
            - text: This pattern works not because the initializer or the coding agent is clever. It works because
            - strong [ref=e252]: "\"what do I know?\" is answered by files on disk, not by the contents of the context window."
          - paragraph [ref=e253]: Every time you move state from in-context to out-of-context, you gain durability and lose nothing important. The two-phase harness is an opinionated way of making that move, applied to the specific problem of building software over many sessions.
          - paragraph [ref=e254]: If your long-running agent keeps "forgetting," the fix is almost never a bigger context window. It's more files.
          - separator [ref=e255]
          - heading "Further reading" [level=2] [ref=e256]
          - list [ref=e257]:
            - listitem [ref=e258]:
              - text: ▸
              - link "scheduling-and-automation.md" [ref=e259] [cursor=pointer]:
                - /url: ./scheduling-and-automation.md
              - text: — how to wake the coding agent on a schedule without human babysitting
            - listitem [ref=e260]:
              - text: ▸
